<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Biblioteca Personal | javilindj</title>
    <link rel="stylesheet" href="libros.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
</head>
<body>

<div class="container">
    <header>
        <div class="header-content">
            <span class="header-icon">📖</span>
            <h1>Mi Biblioteca <span>Personal</span></h1>
            <p class="header-subtitle" id="frase-lectura" style="color: var(--accent); font-style: italic;">Cargando inspiración...</p>
        </div>
        <button onclick="exportarPDF()" class="btn-exportar">📥 Exportar PDF</button>
    
        <div class="search-box">
            <div style="position: relative; flex: 1;">
                <input type="text" id="book-input" placeholder="Título del libro o autor..." oninput="manejarAutocompletado()">
                <div id="sugerencias" class="sugerencias-dropdown"></div>
            </div>
            <button onclick="buscarLibro()">Añadir</button>
        </div>
    </header>

    <main class="estanteria">
        <section class="categoria" id="lista-leyendo-parent">
            <h2>Leyendo ahora</h2>
            <hr>
            <div id="lista-leyendo" class="grid-libros"></div>
        </section>

        <section class="categoria" id="lista-leidos-parent">
            <h2>Ya leídos</h2>
            <hr>
            <div id="lista-leidos" class="grid-libros"></div>
        </section>

        <section class="categoria" id="lista-futuro-parent">
            <h2>Pendientes</h2>
            <hr>
            <div id="lista-futuro" class="grid-libros"></div>
        </section>
    </main>

    <footer>
        javilindj - All Rights Reserved &copy; <span id="year"></span>
    </footer>
</div>

<div id="modal-libro" class="modal">
    <div class="modal-content">
        <div class="modal-rating">
    <p>Mi puntuación:</p>
    <div class="stars" id="modal-stars">
        <span onclick="puntuar(1)">★</span>
        <span onclick="puntuar(2)">★</span>
        <span onclick="puntuar(3)">★</span>
        <span onclick="puntuar(4)">★</span>
        <span onclick="puntuar(5)">★</span>
    </div>
</div>

<div class="modal-notas">
    <label for="notas-personales">Notas personales:</label>
    <textarea id="notas-personales" placeholder="¿Qué te pareció este libro?"></textarea>
    <button onclick="guardarNotas()" class="btn-guardar">Guardar Notas</button>
</div>
        <span class="close-modal" onclick="cerrarModal()">&times;</span>
        <div class="modal-body">
            <img id="modal-portada" src="" alt="Portada grande">
            <div class="modal-info">
                <h2 id="modal-titulo"></h2>
                <h3 id="modal-autor"></h3>
                <div id="modal-descripcion"></div>
            </div>
        </div>
    </div>
</div>


<button class="theme-switch" onclick="toggleTheme()" id="theme-btn">🌙</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<script src="libros.js"></script>
</body>
</html>
